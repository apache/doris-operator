name: PR Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-basic:
    name: Go Basic Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          files="$(git diff --name-only --diff-filter=ACMRT \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} -- '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi

          files="$(gofmt -l $files)"
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=10m

  generated-artifacts:
    name: Generated Artifacts Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate manifests and deepcopy files
        run: make manifests generate

      - name: Check generated artifacts are committed
        run: git diff --exit-code
